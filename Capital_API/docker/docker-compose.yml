## 🔧 环境变量配置

### 全局变量

| 变量名 | 默认值 | 说明 |
|--------|--------|------|
| `AGENTOS_LOG_LEVEL` | `info` | 日志级别: debug/info/warn/error |
| `AGENTOS_CONFIG_DIR` | `/etc/agentos` | 配置文件目录 |
| `AGENTOS_DATA_DIR` | `/var/lib/agentos/data` | 数据存储目录 |
| `AGENTOS_LOG_DIR` | `/var/log/agentos` | 日志输出目录 |

### 网关服务 (gateway_d)

| 变量名 | 默认值 | 说明 |
|--------|--------|------|
| `AGENTOS_HTTP_HOST` | `0.0.0.0` | HTTP监听地址 |
| `AGENTOS_HTTP_PORT` | `8080` | HTTP端口 |
| `AGENTOS_WS_PORT` | `8081` | WebSocket端口 |
| `AGENTOS_STDIO_ENABLED` | `true` | 是否启用Stdio模式 |
| `AGENTOS_MAX_REQUEST_SIZE` | `1048576` | 最大请求大小(字节) |
| `AGENTOS_REQUEST_TIMEOUT` | `30000` | 请求超时(ms) |

### LLM服务 (llm_d)

| 变量名 | 默认值 | 说明 |
|--------|--------|------|
| `OPENAI_API_KEY` | - | OpenAI API密钥 |
| `AGENTOS_LLM_DEFAULT_MODEL` | `gpt-4` | 默认模型 |
| `AGENTOS_LLM_CACHE_SIZE` | `1000` | 缓存容量 |
| `AGENTOS_LLM_CACHE_TTL` | `3600` | 缓存过期时间(秒) |
| `AGENTOS_LLM_MAX_RETRIES` | `3` | 最大重试次数 |
| `AGENTOS_LLM_TIMEOUT` | `30000` | 请求超时(ms) |

### 调度器 (sched_d)

| 变量名 | 默认值 | 说明 |
|--------|--------|------|
| `AGENTOS_SCHED_STRATEGY` | `priority` | 调度策略: priority/fifo/lifo |
| `AGENTOS_SCHED_MAX_CONCURRENT` | `10` | 最大并发任务数 |
| `AGENTOS_SCHED_QUEUE_SIZE` | `1000` | 任务队列容量 |

### 监控服务 (monit_d)

| 变量名 | 默认值 | 说明 |
|--------|--------|------|
| `AGENTOS_MONIT_METRICS_INTERVAL` | `5000` | 指标收集间隔(ms) |
| `AGENTOS_MONIT_TRACING_ENABLED` | `false` | 是否启用追踪 |
| `AGENTOS_MONIT_ALERT_ENABLED` | `true` | 是否启用告警 |

