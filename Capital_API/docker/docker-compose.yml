## 🐳 docker-compose.yml

```yaml
version: '3.8'

services:
  # ===========================================
  # 网关服务 (Gateway)
  # ===========================================
  gateway:
    build:
      context: ../../
      dockerfile: Docs/Capital_API/docker/Dockerfile
    image: agentos:v0.0.4
    container_name: agentos-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP API
      - "8081:8081"   # WebSocket
    volumes:
      - ./config/gateway.conf:/etc/agentos/gateway.conf:ro
      - gateway-data:/var/lib/agentos/data
      - gateway-logs:/var/log/agentos
    environment:
      - AGENTOS_LOG_LEVEL=${LOG_LEVEL:-info}
      - AGENTOS_HTTP_HOST=0.0.0.0
      - AGENTOS_HTTP_PORT=8080
      - AGENTOS_WS_PORT=8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentos-network
    depends_on:
      - llm-service

  # ===========================================
  # LLM 服务 (LLM Daemon)
  # ===========================================
  llm-service:
    build:
      context: ../../
      dockerfile: Docs/Capital_API/docker/Dockerfile
    image: agentos:v0.0.4
    container_name: agentos-llm
    restart: unless-stopped
    volumes:
      - ./config/llm.conf:/etc/agentos/llm.conf:ro
      - llm-cache:/var/cache/agentos/llm
    environment:
      - AGENTOS_LLM_CACHE_SIZE=1000
      - AGENTOS_LLM_DEFAULT_MODEL=gpt-4
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: ["agentos-llm-d", "-c", "/etc/agentos/llm.conf"]
    networks:
      - agentos-network

  # ===========================================
  # 调度器 (Scheduler)
  # ===========================================
  scheduler:
    build:
      context: ../../
      dockerfile: Docs/Capital_API/docker/Dockerfile
    image: agentos:v0.0.4
    container_name: agentos-scheduler
    restart: unless-stopped
    volumes:
      - ./config/scheduler.conf:/etc/agentos/scheduler.conf:ro
    environment:
      - AGENTOS_SCHED_MAX_CONCURRENT=10
      - AGENTOS_SCHED_QUEUE_SIZE=1000
    command: ["agentos-sched-d", "-c", "/etc/agentos/scheduler.conf"]
    networks:
      - agentos-network

  # ===========================================
  # 监控服务 (Monitor)
  # ===========================================
  monitor:
    build:
      context: ../../
      dockerfile: Docs/Capital_API/docker/Dockerfile
    image: agentos:v0.0.4
    container_name: agentos-monitor
    restart: unless-stopped
    ports:
      - "9090:9090"   # Metrics endpoint
    volumes:
      - monitor-data:/var/lib/agentos/monitor
    environment:
      - AGENTOS_MONIT_METRICS_INTERVAL=5000
      - AGENTOS_MONIT_ALERT_ENABLED=true
    command: ["agentos-monit-d"]
    networks:
      - agentos-network

  # ===========================================
  # 市场服务 (Market)
  # ===========================================
  market:
    build:
      context: ../../
      dockerfile: Docs/Capital_API/docker/Dockerfile
    image: agentos:v0.0.4
    container_name: agentos-market
    restart: unless-stopped
    ports:
      - "9000:9000"   # Market API
    volumes:
      - market-db:/var/lib/agentos/market
    command: ["agentos-market-d"]
    networks:
      - agentos-network

volumes:
  gateway-data:
    driver: local
  gateway-logs:
    driver: local
  llm-cache:
    driver: local
  monitor-data:
    driver: local
  market-db:
    driver: local

networks:
  agentos-network:
    driver: bridge
```

