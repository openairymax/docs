## 🐛 故障排查

### 常见问题

#### 1. 容器无法启动

```bash
# 查看容器日志
docker logs agentos-gateway

# 进入容器调试
docker run -it --rm --entrypoint=bash agentos:v0.0.4

# 检查配置文件
docker exec agentos-gateway cat /etc/agentos/gateway.conf
```

#### 2. 端口冲突

```bash
# 检查端口占用
netstat -tlnp | grep 8080

# 修改docker-compose.yml中的端口映射
ports:
  - "9090:8080"  # 映射到主机9090端口
```

#### 3. 内存不足

```bash
# 查看容器资源使用
docker stats agentos-gateway

# 限制内存使用
docker run -m 512m agentos:v0.0.4

# 在docker-compose中添加
deploy:
  resources:
    limits:
      memory: 512M
```

#### 4. 权限问题

```bash
# 确保数据目录权限正确
docker exec agentos-gateway ls -la /var/lib/agentos/

# 修复权限
docker exec -u root agentos-gateway chown -R agentos:agentos /var/lib/agentos/
```

