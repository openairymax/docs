## 🔐 安全配置建议

### 1. 生产环境安全加固

```bash
# 使用非root用户运行（已在Dockerfile中配置）
# USER agentos

# 限制容器权限
docker run --cap-drop=ALL --cap-add=NET_BIND_SERVICE \
  --read-only \
  --tmpfs /tmp:rw,noexec,nosuid,size=64m \
  --security-opt=no-new-privileges \
  agentos:v0.0.4

# 网络隔离
docker network create agentos-isolated --driver bridge --internal
docker run --network agentos-isolated agentos:v0.0.4
```

### 2. 敏感信息管理

```bash
# 不要在docker-compose.yml中硬编码密钥
# ❌ 错误: OPENAI_API_KEY=sk-xxx

# ✅ 正确: 使用.env文件或Docker secrets
echo "OPENAI_API_KEY=sk-xxx" >> .env
docker-compose --env-file .env up -d

# 或使用Docker secrets (Swarm mode)
echo "sk-xxx" | docker secret create openai_api_key -
```

### 3. TLS终止

```yaml
# 在反向代理层处理TLS (推荐nginx/caddy)
services:
  gateway:
    # ... 其他配置
    environment:
      - AGENTOS_HTTP_PORT=8080  # 内部使用HTTP
      # TLS由外部代理处理
      
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
```

nginx.conf 示例:
```nginx
server {
    listen 443 ssl;
    server_name agentos.example.com;
    
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    
    location / {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
```

