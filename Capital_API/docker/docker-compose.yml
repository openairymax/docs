# AgentOS Docker 部署指南

> **版本**: v0.0.4  
> **镜像大小**: ~150MB (Alpine基础) / ~500MB (Ubuntu基础)  
> **支持平台**: linux/amd64, linux/arm64

---

## 🚀 快速启动

### 方式1: 使用docker-compose（推荐）

```bash
# 克隆项目
git clone https://github.com/spharx/AgentOS.git
cd AgentOS

# 启动所有服务
docker-compose up -d

# 查看日志
docker-compose logs -f gateway_d
```

### 方式2: 单独运行网关服务

```bash
# 构建镜像
docker build -t agentos:v0.0.4 -f Docs/Capital_API/docker/Dockerfile .

# 运行网关守护进程
docker run -d \
  --name agentos-gateway \
  -p 8080:8080 \
  -p 8081:8081 \
  -v $(pwd)/config:/etc/agentos \
  -e AGENTOS_LOG_LEVEL=info \
  agentos:v0.0.4 gateway_d
```

### 方式3: 开发环境（挂载源码）

```bash
docker run -it --rm \
  -v $(pwd):/workspace/AgentOS \
  -w /workspace/AgentOS/build \
  agentos:v0.0.4 \
  bash -c "cmake .. && make -j$(nproc) && ctest --output-on-failure"
```

