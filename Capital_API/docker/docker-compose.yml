## 🔄 升级与回滚

### 滚动升级

```bash
# 1. 拉取新镜像
docker pull agentos:v0.0.5

# 2. 更新docker-compose中的镜像版本
sed -i 's/v0.0.4/v0.0.5/' docker-compose.yml

# 3. 逐个重启服务（无停机）
docker-compose up -d --no-deps gateway
# 等待健康检查通过后...
docker-compose up -d --no-deps llm-service
# ...其他服务
```

### 数据备份

```bash
# 备份数据卷
docker run --rm \
  -v agentos-gateway-data:/data \
  -v $(pwd)/backup:/backup \
  alpine tar czf /backup/agentos-data-$(date +%Y%m%d).tar.gz -C /data .

# 恢复数据
docker run --rm \
  -v agentos-gateway-data:/data \
  -v $(pwd)/backup:/backup \
  alpine sh -c "tar xzf /backup/agentos-data-20260428.tar.gz -C /data"
```

