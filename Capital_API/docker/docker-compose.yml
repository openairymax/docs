## 📈 性能优化建议

### 1. 多阶段构建缓存

```dockerfile
# 利用Docker层缓存加速构建
FROM ubuntu:22.04 AS deps
# 安装依赖（变化不频繁）
RUN apt-get update && apt-get install -y ...

FROM deps AS build
COPY . .
# 只有源代码变化时才重新编译
RUN cmake --build build -j$(nproc)
```

### 2. 镜像瘦身

```bash
# 清理APT缓存
RUN apt-get clean && rm -rf /var/lib/apt/lists/*

# 使用多阶段构建只复制必需文件
COPY --from=builder /usr/local/bin/* /usr/local/bin/
COPY --from=builder /usr/local/lib/*.so* /usr/local/lib/
```

### 3. 资源限制最佳实践

```yaml
# docker-compose.yml
services:
  gateway:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M
```

