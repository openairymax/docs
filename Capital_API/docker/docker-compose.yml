## 📦 Dockerfile 参考

### 完整版 Dockerfile (Ubuntu)

```dockerfile
# ============================================================
# AgentOS v0.0.4 - Production Dockerfile
# 基础镜像: Ubuntu 22.04 LTS
# ============================================================

FROM ubuntu:22.04 AS builder

LABEL maintainer="SPHARX Ltd."
LABEL version="0.0.4"
LABEL description="AgentOS - AI Agent Operating System"

# 安装构建依赖
RUN apt-get update && apt-get install -y \
    build-essential \
    cmake \
    ninja-build \
    pkg-config \
    libssl-dev \
    libsqlite3-dev \
    libcjson-dev \
    libcurl4-openssl-dev \
    git \
    && rm -rf /var/lib/apt/lists/*

# 设置工作目录
WORKDIR /build

# 复制源代码
COPY . .

# 配置构建
RUN cmake -B build \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_INSTALL_PREFIX=/usr/local \
    -DBUILD_TESTING=ON \
    -DAGENTOS_ENABLE_EXAMPLES=ON

# 编译
RUN cmake --build build -j$(nproc)

# 运行测试（可选，取消注释以启用）
# RUN cd build && ctest --output-on-failure

# 安装到系统目录
RUN cmake --install build

# ============================================================
# 运行时镜像（更小）
# ============================================================
FROM ubuntu:22.04 AS runtime

LABEL maintainer="SPHARX Ltd."

# 安装运行时依赖
RUN apt-get update && apt-get install -y \
    libssl3 \
    libsqlite3-0 \
    libcjson1 \
    libcurl4 \
    ca-certificates \
    && rm -rf /var/lib/apt/lists/*

# 创建非root用户
RUN groupadd -r agentos && useradd -r -g agentos -d /home/agentos -m agentos

# 从builder阶段复制安装结果
COPY --from=builder /usr/local /usr/local

# 创建必要目录
RUN mkdir -p /etc/agentos /var/log/agentos /var/lib/agentos/data \
    && chown -R agentos:agentos /etc/agentos /var/log/agentos /var/lib/agentos

# 复制默认配置
COPY docker/config/*.conf /etc/agentos/

# 切换到非root用户
USER agentos

# 设置环境变量
ENV AGENTOS_HOME=/usr/local
ENV AGENTOS_CONFIG_DIR=/etc/agentos
ENV AGENTOS_DATA_DIR=/var/lib/agentos/data
ENV AGENTOS_LOG_DIR=/var/log/agentos
ENV LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH

# 暴露端口
EXPOSE 8080 8081 9000

# 健康检查
HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
    CMD curl -f http://localhost:8080/health || exit 1

# 默认启动命令
CMD ["gateway_d", "-c", "/etc/agentos/gateway.conf"]
```

### 轻量版 Dockerfile (Alpine)

```dockerfile
# AgentOS v0.0.4 - Alpine Linux (轻量版)
FROM alpine:3.19 AS builder

RUN apk add --no-cache \
    build-base \
    cmake \
    ninja \
    pkgconfig \
    openssl-dev \
    sqlite-dev \
    cjson-dev \
    curl-dev \
    musl-dev

WORKDIR /build
COPY . .
RUN cmake -B build -DCMAKE_BUILD_TYPE=Release && \
    cmake --build build -j$(nproc) && \
    cmake --install build

FROM alpine:3.19
RUN apk add --no-cache \
    libssl3 \
    sqlite-libs \
    cjson \
    curl \
    ca-certificates

COPY --from=builder /usr/local /usr/local
RUN mkdir -p /etc/agentos /var/log/agentos

ENV LD_LIBRARY_PATH=/usr/local/lib
EXPOSE 8080 8081
CMD ["gateway_d"]
```

