## 📁 配置文件示例

### gateway.conf

```ini
[service]
name = agentos-gateway
version = 0.0.4

[http]
enabled = true
host = 0.0.0.0
port = 8080
max_request_size = 1048576
timeout_ms = 30000

[websocket]
enabled = true
host = 0.0.0.0
port = 8081

[stdio]
enabled = true

[metrics]
enabled = true
interval_ms = 60000

[logging]
level = info
output = /var/log/agentos/gateway.log
max_size_mb = 100
rotate_count = 5

[protocols]
mcp_enabled = true
a2a_enabled = true
openai_enabled = true
```

### llm.conf

```ini
[service]
name = agentos-llm
cache_capacity = 1000
cache_ttl_sec = 3600
max_retries = 3
timeout_ms = 30000

[pricing]
default_model = gpt-4
fallback_model = gpt-3.5-turbo

[model.gpt-4]
input_price_per_1k = 0.03
output_price_per_1k = 0.06
context_window = 128000

[model.gpt-3.5-turbo]
input_price_per_1k = 0.0015
output_price_per_1k = 0.002
context_window = 16385

[token_counter]
encoding = cl100k_base
```

