```bash
# 访问metrics端点
curl http://localhost:9090/metrics

# 输出示例:
# HELP agentos_requests_total Total number of requests
# TYPE agentos_requests_total counter
agentos_requests_total{service="gateway"} 1234

# HELP agentos_request_duration_seconds Request duration
